<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box account-box">
            <h2>My Account</h2>

            <div class="account-info">
                <p><strong>Name:</strong> User Name</p>
                <p><strong>Email:</strong> user@email.com</p>
                <p><strong>Phone:</strong> 9876543210</p>
                <p><strong>City:</strong> Mumbai</p>
            </div>

            <div class="account-actions">
                <button class="auth-btn" type="button">Edit Profile</button>
                <button class="logout-btn" type="button">Logout</button>
            </div>

            <h3 class="booking-title">My Bookings</h3>

            <div class="booking-card">
                <p><strong>Destination:</strong> Kashmir</p>
                <p><strong>Date:</strong> 25-03-2026</p>
                <p><strong>People:</strong> 2</p>
            </div>
        </div>
    </div>
</body>
</html>
