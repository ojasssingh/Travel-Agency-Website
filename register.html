<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="Saffron_Logo.jpeg" alt="Saffron Tourism Logo">
            </a>
            <h2>Saffron Tourism</h2>
        </div>

        <nav>
            <a href="myaccount.php">My Account</a>
            <a href="index.html#tours">Book</a>
            <a href="Contact.html">Contact Us</a>
        </nav>
    </header>

    <section class="page-hero">
        <div class="page-hero-copy">
            <h1>Register</h1>
            <p>Create your Saffron Tourism account and start planning your next trip.</p>
        </div>
    </section>

    <div class="auth-container page-auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>

            <form action="register.php" method="POST">
                <div class="input-group">
                    <input type="text" id="username" name="username" placeholder="Username" pattern="[a-z]+(?: [a-z]+)*" minlength="3" maxlength="30" title="Username must be 3 to 30 characters, use only lowercase letters, and may contain spaces between words" autocomplete="username" required>
                    <div class="error-msg" id="usernameError"></div>
                </div>
                <div class="input-group">
                    <input type="text" id="name" name="name" placeholder="Full Name" pattern="[A-Za-z ]{2,50}" title="Full name should contain only letters and spaces" autocomplete="name" required>
                    <div class="error-msg" id="nameError"></div>
                </div>
                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder="Email" pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}" title="Enter a valid email with @ and a domain extension like .com" autocomplete="email" required>
                    <div class="error-msg" id="emailError"></div>
                </div>
                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="Password" minlength="6" maxlength="50" autocomplete="new-password" required>
                    <div class="error-msg" id="passwordError"></div>
                </div>
                <div class="input-group">
                    <input type="tel" id="phone" name="phone" placeholder="Phone Number" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" title="Phone number should contain exactly 10 digits" required>
                    <div class="error-msg" id="phoneError"></div>
                </div>

                <div class="input-group">
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <div class="error-msg" id="genderError"></div>
                </div>

                <div class="input-group">
                    <input type="date" name="dob" id="dob" title="Date of birth must be in the past, not today, and age must be at least 16 years" required>
                    <div class="error-msg" id="dobError"></div>
                </div>
                <div class="input-group">
                    <textarea id="address" name="address" placeholder="Address" required></textarea>
                    <div class="error-msg" id="addressError"></div>
                </div>
                <div class="input-group">
                    <input type="text" id="city" name="city" placeholder="City" pattern="[A-Za-z ]{2,50}" title="City should contain only letters and spaces" autocomplete="address-level2" required>
                    <div class="error-msg" id="cityError"></div>
                </div>
                <div class="input-group">
                    <input type="text" id="state" name="state" placeholder="State" pattern="[A-Za-z ]{2,50}" title="State should contain only letters and spaces" autocomplete="address-level1" required>
                    <div class="error-msg" id="stateError"></div>
                </div>

                <button type="submit" class="auth-btn">Register</button>
            </form>

            <a href="login.html">Already have an account? Login</a>
        </div>
    </div>
    <script src="validation.js"></script>
    <script>
    (function () {
        const dobInput = document.getElementById('dob');
        if (!dobInput) {
            return;
        }

        const today = new Date();
        today.setFullYear(today.getFullYear() - 16);
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        dobInput.max = `${year}-${month}-${day}`;
    })();
    </script>
</body>
</html>
