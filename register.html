<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="Saffron_Logo.jpeg" alt="Saffron Tourism Logo">
            </a>
            <h2>Saffron Tourism</h2>
        </div>

        <nav>
            <a href="myaccount.php">My Account</a>
            <a href="index.html#tours">Book</a>
            <a href="Contact.html">Contact Us</a>
        </nav>
    </header>

    <section class="page-hero">
        <div class="page-hero-copy">
            <h1>Register</h1>
            <p>Create your Saffron Tourism account and start planning your next trip.</p>
        </div>
    </section>

    <div class="auth-container page-auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>

            <form action="register.php" method="POST">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    pattern="[a-z]+(?: [a-z]+)*"
                    minlength="3"
                    maxlength="30"
                    title="Username must be 3 to 30 characters, use only lowercase letters, and may contain spaces between words"
                    autocomplete="username"
                    required
                >
                <input
                    type="text"
                    name="name"
                    placeholder="Full Name"
                    pattern="[A-Za-z ]{2,50}"
                    title="Full name should contain only letters and spaces"
                    autocomplete="name"
                    required
                >
                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                    title="Enter a valid email with @ and a domain extension like .com"
                    autocomplete="email"
                    required
                >
                <input type="password" name="password" placeholder="Password" minlength="6" maxlength="50" autocomplete="new-password" required>
                <input
                    type="tel"
                    name="phone"
                    placeholder="Phone Number"
                    inputmode="numeric"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    title="Phone number should contain exactly 10 digits"
                    required
                >

                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>

                <input
                    type="date"
                    name="dob"
                    id="dob"
                    title="Date of birth must be in the past, not today, and age must be at least 16 years"
                    required
                >
                <textarea name="address" placeholder="Address" required></textarea>
                <input type="text" name="city" placeholder="City" pattern="[A-Za-z ]{2,50}" title="City should contain only letters and spaces" autocomplete="address-level2" required>
                <input type="text" name="state" placeholder="State" pattern="[A-Za-z ]{2,50}" title="State should contain only letters and spaces" autocomplete="address-level1" required>

                <button type="submit" class="auth-btn">Register</button>
            </form>

            <a href="login.html">Already have an account? Login</a>
        </div>
    </div>
</body>
<script>
    (function () {
        const dobInput = document.getElementById('dob');
        if (!dobInput) {
            return;
        }

        const today = new Date();
        today.setFullYear(today.getFullYear() - 16);
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        dobInput.max = `${year}-${month}-${day}`;
    })();
</script>
</html>
